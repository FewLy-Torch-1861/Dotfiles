# : Manager [[[

[mgr]
cwd = { fg = "#f4dde4" }

# Tab
tab_active = { fg = "#63003e", bg = "#ffafd1", bold = true }
tab_inactive = { fg = "#ffd8e6", bg = "#3d0024" }
tab_width = 1

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#ff826e", bg = "#ff826e" }
marker_cut = { fg = "#ffdad4", bg = "#ffdad4" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#ffb4a6", bg = "#ffb4a6" }

# Count
count_copied = { fg = "#3f0300", bg = "#ffdad4" }
count_cut = { fg = "#3f0300", bg = "#ffdad4" }
count_selected = { fg = "#63003e", bg = "#ffb4a6" }

# Border
border_symbol = "│"
border_style  = { fg = "#ffafd1" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#63003e", fg = "#F4A261" }

[mode]
# Mode
normal_main = { bg = "#ffafd1", fg = "#63003e", bold = true }
normal_alt  = { bg = "#574149", fg = "#ddbfc9" }

# Select mode
select_main = { bg = "#ffafd1", fg = "#59153a", bold = true }
select_alt  = { bg = "#574149", fg = "#ddbfc9" }

# Unset mode
unset_main = { bg = "#ffb4a6", fg = "#660700", bold = true }
unset_alt  = { bg = "#574149", fg = "#ddbfc9" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#ffafd1", bg = "#44353b" }
progress_error = { fg = "#ffb4ab", bg = "#44353b" }

# Permissions
permissions_t = { fg = "#ff1679" }
permissions_w = { fg = "#ff330d" }
permissions_x = { fg = "#ff2b12" }
permissions_r = { fg = "#ff563b" }
permissions_s = { fg = "#ff3f84" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#ffafd1" }
active = { fg = "#ffb4a6", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#ffafd1" }
value = { fg = "#f4dde4" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#ffafd1", bg = "#63003e" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#ffafd1" }
title = {}
hovered = { fg = "#ffdad4", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#44353b" }
cand = { fg = "#ffafd1" }
rest = { fg = "#63003e" }
desc = { fg = "#f4dde4" }
separator = " ▶ "
separator_style = { fg = "#f4dde4" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#f4dde4" }
run = { fg = "#f4dde4" }
footer = { fg = "#59153a", bg = "#ffafd1" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#ffb4a6" }
title_warn = { fg = "#ffafd1" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { name = "*", fg = "#f4dde4" },
    { name = "*/", fg = "#ffafd1" },
]

# : ]]]
