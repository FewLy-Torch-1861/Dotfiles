# : Manager [[[

[mgr]
cwd = { fg = "#f9dbde" }

# Tab
tab_active = { fg = "#670024", bg = "#ffb2bd", bold = true }
tab_inactive = { fg = "#ffd9dd", bg = "#400013" }
tab_width = 1

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#ff9366", bg = "#ff9366" }
marker_cut = { fg = "#ffdbcc", bg = "#ffdbcc" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#ffb693", bg = "#ffb693" }

# Count
count_copied = { fg = "#351000", bg = "#ffdbcc" }
count_cut = { fg = "#351000", bg = "#ffdbcc" }
count_selected = { fg = "#670024", bg = "#ffb693" }

# Border
border_symbol = "│"
border_style  = { fg = "#ffb2bd" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#670024", fg = "#F4A261" }

[mode]
# Mode
normal_main = { bg = "#ffb2bd", fg = "#670024", bold = true }
normal_alt  = { bg = "#5b4043", fg = "#e3bdc1" }

# Select mode
select_main = { bg = "#ffb2bd", fg = "#650325", bold = true }
select_alt  = { bg = "#5b4043", fg = "#e3bdc1" }

# Unset mode
unset_main = { bg = "#ffb693", fg = "#561f00", bold = true }
unset_alt  = { bg = "#5b4043", fg = "#e3bdc1" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#ffb2bd", bg = "#473437" }
progress_error = { fg = "#ffb4ab", bg = "#473437" }

# Permissions
permissions_t = { fg = "#ff193a" }
permissions_w = { fg = "#f95100" }
permissions_x = { fg = "#ff2b12" }
permissions_r = { fg = "#ff6f33" }
permissions_s = { fg = "#ff4054" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#ffb2bd" }
active = { fg = "#ffb693", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#ffb2bd" }
value = { fg = "#f9dbde" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#ffb2bd", bg = "#670024" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#ffb2bd" }
title = {}
hovered = { fg = "#ffdbcc", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#473437" }
cand = { fg = "#ffb2bd" }
rest = { fg = "#670024" }
desc = { fg = "#f9dbde" }
separator = " ▶ "
separator_style = { fg = "#f9dbde" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#f9dbde" }
run = { fg = "#f9dbde" }
footer = { fg = "#650325", bg = "#ffb2bd" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#ffb693" }
title_warn = { fg = "#ffb2bd" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { name = "*", fg = "#f9dbde" },
    { name = "*/", fg = "#ffb2bd" },
]

# : ]]]
