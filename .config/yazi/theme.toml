# : Manager [[[

[manager]
cwd = { fg = "#ece1d4" }

# Tab
tab_active = { fg = "#432c00", bg = "#f1be6d", bold = true }
tab_inactive = { fg = "#ffddae", bg = "#281800" }
tab_width = 1

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#9ad171", bg = "#9ad171" }
marker_cut = { fg = "#d1eabe", bg = "#d1eabe" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#b6cea3", bg = "#b6cea3" }

# Count
count_copied = { fg = "#0e2005", bg = "#d1eabe" }
count_cut = { fg = "#0e2005", bg = "#d1eabe" }
count_selected = { fg = "#432c00", bg = "#b6cea3" }

# Border
border_symbol = "│"
border_style  = { fg = "#f1be6d" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#432c00", fg = "#F4A261" }

[mode]
# Mode
normal_main = { bg = "#f1be6d", fg = "#432c00", bold = true }
normal_alt  = { bg = "#4f4539", fg = "#d2c4b4" }

# Select mode
select_main = { bg = "#dcc3a1", fg = "#3d2e16", bold = true }
select_alt  = { bg = "#4f4539", fg = "#d2c4b4" }

# Unset mode
unset_main = { bg = "#b6cea3", fg = "#223517", bold = true }
unset_alt  = { bg = "#4f4539", fg = "#d2c4b4" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#f1be6d", bg = "#3f382f" }
progress_error = { fg = "#ffb4ab", bg = "#3f382f" }

# Permissions
permissions_t = { fg = "#a67a3e" }
permissions_w = { fg = "#688d4b" }
permissions_x = { fg = "#ff2b12" }
permissions_r = { fg = "#7fc54a" }
permissions_s = { fg = "#ff9d15" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#f1be6d" }
active = { fg = "#b6cea3", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#f1be6d" }
value = { fg = "#ece1d4" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#f1be6d", bg = "#432c00" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#f1be6d" }
title = {}
hovered = { fg = "#d1eabe", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#3f382f" }
cand = { fg = "#f1be6d" }
rest = { fg = "#432c00" }
desc = { fg = "#ece1d4" }
separator = " ▶ "
separator_style = { fg = "#ece1d4" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#ece1d4" }
run = { fg = "#ece1d4" }
footer = { fg = "#3d2e16", bg = "#dcc3a1" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#b6cea3" }
title_warn = { fg = "#f1be6d" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { name = "*", fg = "#ece1d4" },
    { name = "*/", fg = "#f1be6d" },
]

# : ]]]
