# : Manager [[[

[mgr]
cwd = { fg = "#e5e1e3" }

# Tab
tab_active = { fg = "#2d2f41", bg = "#c4c5dc", bold = true }
tab_inactive = { fg = "#e1e0f9", bg = "#181a2b" }
tab_width = 1

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#e884c0", bg = "#e884c0" }
marker_cut = { fg = "#f8daec", bg = "#f8daec" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#dbbfcf", bg = "#dbbfcf" }

# Count
count_copied = { fg = "#271622", bg = "#f8daec" }
count_cut = { fg = "#271622", bg = "#f8daec" }
count_selected = { fg = "#2d2f41", bg = "#dbbfcf" }

# Border
border_symbol = "│"
border_style  = { fg = "#c4c5dc" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#2d2f41", fg = "#F4A261" }

[mode]
# Mode
normal_main = { bg = "#c4c5dc", fg = "#2d2f41", bold = true }
normal_alt  = { bg = "#47464c", fg = "#c8c5cd" }

# Select mode
select_main = { bg = "#c7c5d0", fg = "#303038", bold = true }
select_alt  = { bg = "#47464c", fg = "#c8c5cd" }

# Unset mode
unset_main = { bg = "#dbbfcf", fg = "#3e2b37", bold = true }
unset_alt  = { bg = "#47464c", fg = "#c8c5cd" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#c4c5dc", bg = "#3a393a" }
progress_error = { fg = "#ffb4ab", bg = "#3a393a" }

# Permissions
permissions_t = { fg = "#76718b" }
permissions_w = { fg = "#a45d86" }
permissions_x = { fg = "#ff2b12" }
permissions_r = { fg = "#e059aa" }
permissions_s = { fg = "#6560e0" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#c4c5dc" }
active = { fg = "#dbbfcf", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#c4c5dc" }
value = { fg = "#e5e1e3" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#c4c5dc", bg = "#2d2f41" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#c4c5dc" }
title = {}
hovered = { fg = "#f8daec", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#3a393a" }
cand = { fg = "#c4c5dc" }
rest = { fg = "#2d2f41" }
desc = { fg = "#e5e1e3" }
separator = " ▶ "
separator_style = { fg = "#e5e1e3" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#e5e1e3" }
run = { fg = "#e5e1e3" }
footer = { fg = "#303038", bg = "#c7c5d0" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#dbbfcf" }
title_warn = { fg = "#c4c5dc" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { name = "*", fg = "#e5e1e3" },
    { name = "*/", fg = "#c4c5dc" },
]

# : ]]]
