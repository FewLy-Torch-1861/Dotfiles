# : Manager [[[

[mgr]
cwd = { fg = "#ebe0e0" }

# Tab
tab_active = { fg = "#50212d", bg = "#ffd9e0", bold = true }
tab_inactive = { fg = "#ffd9df", bg = "#360c19" }
tab_width = 1

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#ffa657", bg = "#ffa657" }
marker_cut = { fg = "#ffdcbd", bg = "#ffdcbd" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#ffddbe", bg = "#ffddbe" }

# Count
count_copied = { fg = "#2c1600", bg = "#ffdcbd" }
count_cut = { fg = "#2c1600", bg = "#ffdcbd" }
count_selected = { fg = "#50212d", bg = "#ffddbe" }

# Border
border_symbol = "│"
border_style  = { fg = "#fcb3c2" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#50212d", fg = "#F4A261" }

[mode]
# Mode
normal_main = { bg = "#ffd9e0", fg = "#50212d", bold = true }
normal_alt  = { bg = "#514346", fg = "#d6c2c4" }

# Select mode
select_main = { bg = "#e2bdc4", fg = "#422a2f", bold = true }
select_alt  = { bg = "#514346", fg = "#d6c2c4" }

# Unset mode
unset_main = { bg = "#ffddbe", fg = "#492900", bold = true }
unset_alt  = { bg = "#514346", fg = "#d6c2c4" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#ffd9e0", bg = "#3e3738" }
progress_error = { fg = "#ffb4ab", bg = "#3e3738" }

# Permissions
permissions_t = { fg = "#b35365" }
permissions_w = { fg = "#ff8d25" }
permissions_x = { fg = "#ff2b12" }
permissions_r = { fg = "#ff8b24" }
permissions_s = { fg = "#ff405e" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#ffd9e0" }
active = { fg = "#ffddbe", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#ffd9e0" }
value = { fg = "#ebe0e0" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#ffd9e0", bg = "#50212d" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#ffd9e0" }
title = {}
hovered = { fg = "#ffdcbd", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#3e3738" }
cand = { fg = "#ffd9e0" }
rest = { fg = "#50212d" }
desc = { fg = "#ebe0e0" }
separator = " ▶ "
separator_style = { fg = "#ebe0e0" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#ebe0e0" }
run = { fg = "#ebe0e0" }
footer = { fg = "#422a2f", bg = "#e2bdc4" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#ffddbe" }
title_warn = { fg = "#ffd9e0" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { name = "*", fg = "#ebe0e0" },
    { name = "*/", fg = "#fcb3c2" },
]

# : ]]]
