# : Manager [[[

[mgr]
cwd = { fg = "#e6e1e4" }

# Tab
tab_active = { fg = "#352c48", bg = "#cec1e5", bold = true }
tab_inactive = { fg = "#eaddff", bg = "#1f1732" }
tab_width = 1

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#ff72a5", bg = "#ff72a5" }
marker_cut = { fg = "#ffd8e6", bg = "#ffd8e6" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#eabacc", bg = "#eabacc" }

# Count
count_copied = { fg = "#2e1220", bg = "#ffd8e6" }
count_cut = { fg = "#2e1220", bg = "#ffd8e6" }
count_selected = { fg = "#352c48", bg = "#eabacc" }

# Border
border_symbol = "│"
border_style  = { fg = "#cec1e5" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#352c48", fg = "#F4A261" }

[mode]
# Mode
normal_main = { bg = "#cec1e5", fg = "#352c48", bold = true }
normal_alt  = { bg = "#49454d", fg = "#cac4cd" }

# Select mode
select_main = { bg = "#cbc3d3", fg = "#332e3b", bold = true }
select_alt  = { bg = "#49454d", fg = "#cac4cd" }

# Unset mode
unset_main = { bg = "#eabacc", fg = "#462735", bold = true }
unset_alt  = { bg = "#49454d", fg = "#cac4cd" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#cec1e5", bg = "#3a383b" }
progress_error = { fg = "#ffb4ab", bg = "#3a383b" }

# Permissions
permissions_t = { fg = "#7e6b92" }
permissions_w = { fg = "#c64575" }
permissions_x = { fg = "#ff2b12" }
permissions_r = { fg = "#ff3f84" }
permissions_s = { fg = "#8b44ff" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#cec1e5" }
active = { fg = "#eabacc", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#cec1e5" }
value = { fg = "#e6e1e4" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#cec1e5", bg = "#352c48" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#cec1e5" }
title = {}
hovered = { fg = "#ffd8e6", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#3a383b" }
cand = { fg = "#cec1e5" }
rest = { fg = "#352c48" }
desc = { fg = "#e6e1e4" }
separator = " ▶ "
separator_style = { fg = "#e6e1e4" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#e6e1e4" }
run = { fg = "#e6e1e4" }
footer = { fg = "#332e3b", bg = "#cbc3d3" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#eabacc" }
title_warn = { fg = "#cec1e5" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { name = "*", fg = "#e6e1e4" },
    { name = "*/", fg = "#cec1e5" },
]

# : ]]]
