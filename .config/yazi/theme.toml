# : Manager [[[

[mgr]
cwd = { fg = "#e5e1e3" }

# Tab
tab_active = { fg = "#302f3f", bg = "#c8c4d9", bold = true }
tab_inactive = { fg = "#e4e0f6", bg = "#1b1a29" }
tab_width = 1

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#eb82ab", bg = "#eb82ab" }
marker_cut = { fg = "#f9dae6", bg = "#f9dae6" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#dcbfca", bg = "#dcbfca" }

# Count
count_copied = { fg = "#28161f", bg = "#f9dae6" }
count_cut = { fg = "#28161f", bg = "#f9dae6" }
count_selected = { fg = "#302f3f", bg = "#dcbfca" }

# Border
border_symbol = "│"
border_style  = { fg = "#c8c4d9" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#302f3f", fg = "#F4A261" }

[mode]
# Mode
normal_main = { bg = "#c8c4d9", fg = "#302f3f", bold = true }
normal_alt  = { bg = "#47464c", fg = "#c9c5cc" }

# Select mode
select_main = { bg = "#c8c5ce", fg = "#312f37", bold = true }
select_alt  = { bg = "#47464c", fg = "#c9c5cc" }

# Unset mode
unset_main = { bg = "#dcbfca", fg = "#3e2b34", bold = true }
unset_alt  = { bg = "#47464c", fg = "#c9c5cc" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#c8c4d9", bg = "#3a393a" }
progress_error = { fg = "#ffb4ab", bg = "#3a393a" }

# Permissions
permissions_t = { fg = "#797288" }
permissions_w = { fg = "#a65c78" }
permissions_x = { fg = "#ff2b12" }
permissions_r = { fg = "#e4568d" }
permissions_s = { fg = "#7d69d4" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#c8c4d9" }
active = { fg = "#dcbfca", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#c8c4d9" }
value = { fg = "#e5e1e3" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#c8c4d9", bg = "#302f3f" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#c8c4d9" }
title = {}
hovered = { fg = "#f9dae6", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#3a393a" }
cand = { fg = "#c8c4d9" }
rest = { fg = "#302f3f" }
desc = { fg = "#e5e1e3" }
separator = " ▶ "
separator_style = { fg = "#e5e1e3" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#e5e1e3" }
run = { fg = "#e5e1e3" }
footer = { fg = "#312f37", bg = "#c8c5ce" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#dcbfca" }
title_warn = { fg = "#c8c4d9" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { name = "*", fg = "#e5e1e3" },
    { name = "*/", fg = "#c8c4d9" },
]

# : ]]]
