# : Manager [[[

[manager]
cwd = { fg = "#e9e0e8" }

# Tab
tab_active = { fg = "#49136e", bg = "#e2b7ff", bold = true }
tab_inactive = { fg = "#f3daff", bg = "#2e004d" }
tab_width = 1

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#ff7394", bg = "#ff7394" }
marker_cut = { fg = "#ffd9e2", bg = "#ffd9e2" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#ffb1c9", bg = "#ffb1c9" }

# Count
count_copied = { fg = "#3e001d", bg = "#ffd9e2" }
count_cut = { fg = "#3e001d", bg = "#ffd9e2" }
count_selected = { fg = "#49136e", bg = "#ffb1c9" }

# Border
border_symbol = "│"
border_style  = { fg = "#e2b6ff" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#49136e", fg = "#F4A261" }

[mode]
# Mode
normal_main = { bg = "#e2b7ff", fg = "#49136e", bold = true }
normal_alt  = { bg = "#4c4450", fg = "#cfc3d1" }

# Select mode
select_main = { bg = "#d8bde7", fg = "#3c284a", bold = true }
select_alt  = { bg = "#4c4450", fg = "#cfc3d1" }

# Unset mode
unset_main = { bg = "#ffb1c9", fg = "#610b33", bold = true }
unset_alt  = { bg = "#4c4450", fg = "#cfc3d1" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#e2b7ff", bg = "#3c373e" }
progress_error = { fg = "#ffb4ab", bg = "#3c373e" }

# Permissions
permissions_t = { fg = "#964dbe" }
permissions_w = { fg = "#ff185f" }
permissions_x = { fg = "#ff2b12" }
permissions_r = { fg = "#ff406d" }
permissions_s = { fg = "#c141ff" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#e2b7ff" }
active = { fg = "#ffb1c9", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#e2b7ff" }
value = { fg = "#e9e0e8" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#e2b7ff", bg = "#49136e" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#e2b7ff" }
title = {}
hovered = { fg = "#ffd9e2", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#3c373e" }
cand = { fg = "#e2b7ff" }
rest = { fg = "#49136e" }
desc = { fg = "#e9e0e8" }
separator = " ▶ "
separator_style = { fg = "#e9e0e8" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#e9e0e8" }
run = { fg = "#e9e0e8" }
footer = { fg = "#3c284a", bg = "#d8bde7" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#ffb1c9" }
title_warn = { fg = "#e2b7ff" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { name = "*", fg = "#e9e0e8" },
    { name = "*/", fg = "#e2b6ff" },
]

# : ]]]
