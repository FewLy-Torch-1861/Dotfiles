# : Manager [[[

[manager]
cwd = { fg = "#e0e2ec" }

# Tab
tab_active = { fg = "#002f67", bg = "#acc7ff", bold = true }
tab_inactive = { fg = "#d7e2ff", bg = "#001a40" }
tab_width = 1

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#f171ff", bg = "#f171ff" }
marker_cut = { fg = "#fbd7ff", bg = "#fbd7ff" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#f0b0ff", bg = "#f0b0ff" }

# Count
count_copied = { fg = "#330044", bg = "#fbd7ff" }
count_cut = { fg = "#330044", bg = "#fbd7ff" }
count_selected = { fg = "#002f67", bg = "#f0b0ff" }

# Border
border_symbol = "│"
border_style  = { fg = "#acc7ff" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#002f67", fg = "#F4A261" }

[mode]
# Mode
normal_main = { bg = "#acc7ff", fg = "#002f67", bold = true }
normal_alt  = { bg = "#414754", fg = "#c1c6d6" }

# Select mode
select_main = { bg = "#acc7fe", fg = "#102f5e", bold = true }
select_alt  = { bg = "#414754", fg = "#c1c6d6" }

# Unset mode
unset_main = { bg = "#f0b0ff", fg = "#54006d", bold = true }
unset_alt  = { bg = "#414754", fg = "#c1c6d6" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#acc7ff", bg = "#363941" }
progress_error = { fg = "#ffb4ab", bg = "#363941" }

# Permissions
permissions_t = { fg = "#1561fc" }
permissions_w = { fg = "#d317ff" }
permissions_x = { fg = "#ff2b12" }
permissions_r = { fg = "#ec3eff" }
permissions_s = { fg = "#3e73ff" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#acc7ff" }
active = { fg = "#f0b0ff", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#acc7ff" }
value = { fg = "#e0e2ec" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#acc7ff", bg = "#002f67" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#acc7ff" }
title = {}
hovered = { fg = "#fbd7ff", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#363941" }
cand = { fg = "#acc7ff" }
rest = { fg = "#002f67" }
desc = { fg = "#e0e2ec" }
separator = " ▶ "
separator_style = { fg = "#e0e2ec" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#e0e2ec" }
run = { fg = "#e0e2ec" }
footer = { fg = "#102f5e", bg = "#acc7fe" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#f0b0ff" }
title_warn = { fg = "#acc7ff" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { name = "*", fg = "#e0e2ec" },
    { name = "*/", fg = "#acc7ff" },
]

# : ]]]
