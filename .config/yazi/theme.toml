# : Manager [[[

[mgr]
cwd = { fg = "#e2e3e1" }

# Tab
tab_active = { fg = "#09372f", bg = "#abd7cb", bold = true }
tab_inactive = { fg = "#bfece0", bg = "#00201b" }
tab_width = 1

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#8a79ff", bg = "#8a79ff" }
marker_cut = { fg = "#e3dfff", bg = "#e3dfff" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#cec9f0", bg = "#cec9f0" }

# Count
count_copied = { fg = "#1a1835", bg = "#e3dfff" }
count_cut = { fg = "#1a1835", bg = "#e3dfff" }
count_selected = { fg = "#09372f", bg = "#cec9f0" }

# Border
border_symbol = "│"
border_style  = { fg = "#a4cfc4" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#09372f", fg = "#F4A261" }

[mode]
# Mode
normal_main = { bg = "#abd7cb", fg = "#09372f", bold = true }
normal_alt  = { bg = "#414846", fg = "#c0c8c5" }

# Select mode
select_main = { bg = "#b9cac5", fg = "#243330", bold = true }
select_alt  = { bg = "#414846", fg = "#c0c8c5" }

# Unset mode
unset_main = { bg = "#cec9f0", fg = "#2f2d4b", bold = true }
unset_alt  = { bg = "#414846", fg = "#c0c8c5" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#abd7cb", bg = "#373a39" }
progress_error = { fg = "#ffb4ab", bg = "#373a39" }

# Permissions
permissions_t = { fg = "#65857c" }
permissions_w = { fg = "#6151cf" }
permissions_x = { fg = "#ff2b12" }
permissions_r = { fg = "#5d46ff" }
permissions_s = { fg = "#49c9a7" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#abd7cb" }
active = { fg = "#cec9f0", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#abd7cb" }
value = { fg = "#e2e3e1" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#abd7cb", bg = "#09372f" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#abd7cb" }
title = {}
hovered = { fg = "#e3dfff", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#373a39" }
cand = { fg = "#abd7cb" }
rest = { fg = "#09372f" }
desc = { fg = "#e2e3e1" }
separator = " ▶ "
separator_style = { fg = "#e2e3e1" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#e2e3e1" }
run = { fg = "#e2e3e1" }
footer = { fg = "#243330", bg = "#b9cac5" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#cec9f0" }
title_warn = { fg = "#abd7cb" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { name = "*", fg = "#e2e3e1" },
    { name = "*/", fg = "#a4cfc4" },
]

# : ]]]
