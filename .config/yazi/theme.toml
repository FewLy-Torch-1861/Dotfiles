# : Manager [[[

[manager]
cwd = { fg = "#e5e1e4" }

# Tab
tab_active = { fg = "#2f2d4c", bg = "#c6c2e9", bold = true }
tab_inactive = { fg = "#e3dfff", bg = "#1a1835" }
tab_width = 1

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#ff72b7", bg = "#ff72b7" }
marker_cut = { fg = "#ffd8eb", bg = "#ffd8eb" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#e8bad2", bg = "#e8bad2" }

# Count
count_copied = { fg = "#2e1224", bg = "#ffd8eb" }
count_cut = { fg = "#2e1224", bg = "#ffd8eb" }
count_selected = { fg = "#2f2d4c", bg = "#e8bad2" }

# Border
border_symbol = "│"
border_style  = { fg = "#c6c2e9" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#2f2d4c", fg = "#F4A261" }

[mode]
# Mode
normal_main = { bg = "#c6c2e9", fg = "#2f2d4c", bold = true }
normal_alt  = { bg = "#47464d", fg = "#c8c5ce" }

# Select mode
select_main = { bg = "#c8c4d5", fg = "#302f3c", bold = true }
select_alt  = { bg = "#47464d", fg = "#c8c5ce" }

# Unset mode
unset_main = { bg = "#e8bad2", fg = "#452639", bold = true }
unset_alt  = { bg = "#47464d", fg = "#c8c5ce" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#c6c2e9", bg = "#3a393b" }
progress_error = { fg = "#ffb4ab", bg = "#3a393b" }

# Permissions
permissions_t = { fg = "#756b95" }
permissions_w = { fg = "#c24787" }
permissions_x = { fg = "#ff2b12" }
permissions_r = { fg = "#ff3f9d" }
permissions_s = { fg = "#5d46ff" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#c6c2e9" }
active = { fg = "#e8bad2", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#c6c2e9" }
value = { fg = "#e5e1e4" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#c6c2e9", bg = "#2f2d4c" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#c6c2e9" }
title = {}
hovered = { fg = "#ffd8eb", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#3a393b" }
cand = { fg = "#c6c2e9" }
rest = { fg = "#2f2d4c" }
desc = { fg = "#e5e1e4" }
separator = " ▶ "
separator_style = { fg = "#e5e1e4" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#e5e1e4" }
run = { fg = "#e5e1e4" }
footer = { fg = "#302f3c", bg = "#c8c4d5" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#e8bad2" }
title_warn = { fg = "#c6c2e9" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { name = "*", fg = "#e5e1e4" },
    { name = "*/", fg = "#c6c2e9" },
]

# : ]]]
