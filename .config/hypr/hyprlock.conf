source = $HOME/.config/hypr/colors.conf

$font_family=NotoSans Nerd Font

background {
  path = screenshot

  color = rgb(0,0,0)

  blur_size = 4
  blur_passes = 2
  noise = 0
  brightness = 0.5
}

# Hours
label {
  text = cmd[update:360] date +%H
  color = $color13
  font_family = $font_family Bold
  font_size = 80
  position = 0, -150
  halign = center
  valign = top
}

# Minutes
label {
  text = cmd[update:30] date +%M
  color = $color13
  font_family = $font_family Bold
  font_size = 80
  position = 0, -240
  halign = center
  valign = top
}

# DATE
label {
  text = cmd[update:180000] echo " $(date +%d/%m/%Y)"
  color = $color3
  font_family = $font_family
  font_size = 24
  position = -10, 70
  halign = right
  valign = bottom
}

# UPTIME
label {
  text = cmd[update:1] echo " $(uptime -p | cut -d ' ' -f2-)"
  color = $color3
  font_family = $font_family
  font_size = 24
  position = -10, 35
  halign = right
  valign = bottom
}

# NOW PLAYING 
label {
  text = cmd[update:1] echo " $(playerctl metadata artist) : $(playerctl metadata title)"
  color = $color3
  font_family = $font_family
  font_size = 24
  position = -10, 0
  halign = right
  valign = bottom
}

# LAYOUT
label {
  text =  $LAYOUT
  color = $color3
  font_family = $font_family
  font_size = 24
  position = 10, 0
  halign = left
  valign = bottom
}

# USER
label {
  text = <b> $USER</b>
  color = $color5
  font_family = $font_family
  font_size = 24
  position = 0, 175
  halign = center
  valign = bottom
}

# INPUT FIELD
input-field {
  size = 300, 50
  outline_thickness = 2
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  outer_color = $color9
  inner_color = rgba(255, 255, 255, 0.1)
  capslock_color = $color12
  font_color = $color14
  fade_on_empty = false
  font_family = $font_family
  placeholder_text = <i><span foreground="##ffffff99">Type Password</span></i>
  hide_input = false
  position = 0, 100
  halign = center
  valign = bottom
}
