source = $HOME/.config/hypr/colors.conf

# BACKGROUND
background {
  monitor =
  path = ~/.currentwall
  blur_passes = 3
  blur_size = 3
  contrast = 1.0
  brightness = 0.5
  vibrancy = 0.0
  vibrancy_darkness = 0.0
}

# GENERAL
general {
  no_fade_in = false
  grace = 0
  disable_loading_bar = true
  hide_cursor = true
}

# INPUT FIELD
input-field {
  monitor =
  size = 256, 48
  outline_thickness = 0
  dots_size = 0.2
  dots_spacing = 0.5
  dots_center = true
  outer_color = 0x00000000
  inner_color = rgba(0, 0, 0, 1)
  font_color = 0xff$on_surface_hex
  fail_color = 0xff$error_hex
  check_color = 0xff$tertiary_hex
  capslock_color = 0xff$secondary_hex
  fade_on_empty = false
  font_family = Iosevka Nerd Font
  placeholder_text = ...
  hide_input = false
  position = 0, -100
  halign = center
  valign = center
  shadow_passes = 1
  shadow_size = 5
  shadow_boost = 0.5
}

# TIME
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%H:%M:%S")"
  color = 0xff$on_surface_hex
  font_size = 14
  font_family = Iosevka Nerd Font Bold
  position = 0, -150
  halign = center
  valign = center
  shadow_passes = 1
  shadow_size = 5
  shadow_boost = 0.5
}

# USER
label {
  monitor =
  text = cmd[update:1000] echo "$USER@$(hostname)"
  color = 0xff$on_surface_hex
  font_size = 14
  font_family = Iosevka Nerd Font Bold Italic
  position = 0, -50
  halign = center
  valign = center
  shadow_passes = 1
  shadow_size = 5
  shadow_boost = 0.5
}

# PICTURE
image {
  path = .face.icon
  size = 200
  position = 0, 75
  halign = center
  valign = center
  border_size = 3
  border_color = 0xff$primary_hex
  shadow_passes = 1
  shadow_size = 5
  shadow_boost = 0.5
}
