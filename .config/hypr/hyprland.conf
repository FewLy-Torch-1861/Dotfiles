###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = xdg-open ~
$browser = zen-browser


#################
### AUTOSTART ###
#################

exec-once = systemctl --user start hyprpolkitagent
exec-once = syncthing
exec-once = hypridle
exec-once = mako
exec-once = swww-daemon
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = brightnessctl -q s 100%
exec-once = nwg-look -a
exec-once = waybar
exec-once = spotify
exec-once = discord
exec-once = $browser


#############################
### ENVIRONMENT VARIABLES ###
#############################

# Theme
env = QT_QPA_PLATFORMTHEME,qt5ct
# env = QT_STYLE_OVERRIDE,kvantum

# Cursor
env = HYPRCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,24
env = XCURSOR_SIZE,24

# WM
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

source = colors.conf
source = monitors.conf
source = workspaces.conf

$scriptsDir = ~/.config/hypr/scripts


#####################
### LOOK AND FEEL ###
#####################

general {
  gaps_in = 3
  gaps_out = 6

  border_size = 1
  col.active_border = $primary
  col.inactive_border = $primary_container

  resize_on_border = false

  allow_tearing = false

  layout = dwindle
}

decoration {
  rounding = 20
  rounding_power = 2

  active_opacity = 0.95
  inactive_opacity = 0.80
  fullscreen_opacity = 1.0

  shadow {
    enabled = true
    range = 6
    render_power = 3
    color = rgba(000000ee)
  }

  blur {
    enabled = true
    size = 6
    passes = 4
    noise = 0

    popups = true
    popups_ignorealpha = 0.5
  }
}

animations {
  enabled = yes
  first_launch_animation = true

  bezier = wind, 0.05, 0.9, 0.1, 1.05
  bezier = winIn, 0.1, 1.1, 0.1, 1.1
  bezier = winOut, 0.3, -0.3, 0, 1
  bezier = liner, 1, 1, 1, 1
  bezier = overshot, 0.05, 0.9, 0.1, 1.05
  bezier = smoothOut, 0.5, 0, 0.99, 0.99
  bezier = smoothIn, 0.5, -0.5, 0.68, 1.5
  
  animation = windows, 1, 6, wind, slide
  animation = windowsIn, 1, 5, winIn, slide
  animation = windowsOut, 1, 3, smoothOut, slide
  animation = windowsMove, 1, 5, wind, slide
  animation = border, 1, 1, liner
  animation = fade, 1, 3, smoothOut
  animation = workspaces, 1, 5, overshot
  animation = workspacesIn, 1, 5, winIn, slide
  animation = workspacesOut, 1, 5, winOut, slide
  animation = specialWorkspaceIn, 1, 5, winIn, slidevert
  animation = specialWorkspaceOut, 1, 5, winOut, slidevert
}


dwindle {
  pseudotile = true
  preserve_split = true
}

master {
  new_status = master
}

xwayland {
  force_zero_scaling = true
}

misc {
  force_default_wallpaper = 0
  disable_hyprland_logo = true
  mouse_move_enables_dpms = true
  key_press_enables_dpms = true
  focus_on_activate = true
  vfr = true
}

debug {
  # overlay = true
}


#############
### INPUT ###
#############

input {
  kb_layout = us, th
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =

  follow_mouse = 1

  sensitivity = 0
  accel_profile = flat
  force_no_accel = true

  touchpad {
    disable_while_typing = true
    natural_scroll = true
  }
}

gestures {
  workspace_swipe = true
}


#############
### GROUP ###
#############

group {
  col.border_active = $tertiary
  col.border_inactive = $tertiary_container

  groupbar {
    gaps_in = 2
    gaps_out = 2

    text_color = $on_tertiary_container
    col.active = $tertiary
    col.inactive = $tertiary_container
    col.locked_active = $secondary
    col.locked_inactive = $secondary_container
  }
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER
$sysMod = SUPER CTRL SHIFT

# Open programs
bind = ALT, SPACE, exec, $scriptsDir/rofi.sh n # Programs launcher
bind = $mainMod SHIFT, RETURN, exec, [float; move 15% 7%; size 70% 50%] $terminal # Dropdown Terminal
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser


# Common shortcut
bindl = CTRL SHIFT, ESCAPE, exec, kitty sh -c "btop" # Process viewer

bindl = $sysMod, N, exec, hyprsunset -t 5000 || pkill hyprsunset # Toggle Nightlight
bindl = $mainMod, EQUAL, exec, hypr-zoom -duration=20 -steps=20 -interp=Linear # Zoom
bindel = $mainMod, SPACE, exec, $scriptsDir/kb_layout.sh # Switch keyboard layout
bindl = $sysMod, G, exec, $scriptsDir/gamemode.sh yes # Enable Gamemode

bindl = , PRINT, exec, $scriptsDir/screenshot.sh output # Screenshot entire screen
bind = CTRL, PRINT, exec, $scriptsDir/screenshot.sh region # Screenshot region
bind = ALT, PRINT, exec, $scriptsDir/screenshot.sh window # Screenshot window


# Utility
bind = $mainMod SHIFT, C, exec, hyprpicker -a # Pick on screen colors

bind = $sysMod, W, exec, $scriptsDir/wallpaper.sh # Wallpaper selecter
bind = $mainMod, PERIOD, exec, $scriptsDir/rofi.sh e # Emoji selecter

bind = $mainMod, V, exec, $scriptsDir/rofi.sh c # Clipboard
bind = $sysMod, V, exec, $scriptsDir/rofi.sh c wipe # Clear Clipboard histories

bind = $mainMod, D, exec, $scriptsDir/rofi.sh w # Web search
bind = , XF86Search, exec, $scriptsDir/rofi.sh w # Web search


# Manage windows
bind = $mainMod, F, togglefloating,
bind = $mainMod SHIFT, F, fullscreen,
bind = ALT, F4, forcekillactive,
bind = $mainMod, Q, killactive,
bind = $mainMod, P, pseudo,
bind = $mainMod, O, togglesplit,

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# to switch between windows in a floating workspace
binde = ALT, Tab, cyclenext,        # change focus to another window
binde = ALT, Tab, bringactivetotop, # bring it to the top


# Group
bind = $mainMod, G, submap, Group

submap = Group

bind = , G, togglegroup,
bind = , R, lockactivegroup, toggle
binde = , F, changegroupactive, f
binde = , B, changegroupactive, b

bind = , H, moveintogroup, l
bind = , J, moveintogroup, d
bind = , K, moveintogroup, u
bind = , L, moveintogroup, r

bindl = , catchall, submap, reset

submap = reset


# Resize
bind = $mainMod, R, submap, Resize

submap = Resize

binde = , H, resizeactive, -10 0
binde = , J, resizeactive, 0 10
binde = , K, resizeactive, 0 -10
binde = , L, resizeactive, 10 0

binde = , Y, resizeactive, -50 0
binde = , U, resizeactive, 0 50
binde = , I, resizeactive, 0 -50
binde = , O, resizeactive, 50 0

bindl = , catchall, submap, reset

submap = reset


# System
bind = $sysMod, M, exec, wlogout # Logout dialog
bind = CTRL ALT, DELETE, exec, wlogout # Logout dialog
bindl = $sysMod, L, exec, hyprlock # Lock screen
bind = $sysMod, R, exec, $scriptsDir/reload.sh # Reload most config


# Window
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

binde = $mainMod ALT, H, resizeactive, -10 0
binde = $mainMod ALT, J, resizeactive, 0 10
binde = $mainMod ALT, K, resizeactive, 0 -10
binde = $mainMod ALT, L, resizeactive, 10 0


# Workspaces
binde = $mainMod, TAB, workspace, e+1
binde = $mainMod SHIFT, TAB, workspace, e-1

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1


# Laptop buttons
bindel = ,XF86AudioRaiseVolume, exec, $scriptsDir/volume.sh inc
bindel = ,XF86AudioLowerVolume, exec, $scriptsDir/volume.sh dec
bindel = SHIFT, XF86AudioRaiseVolume, exec, $scriptsDir/volume.sh linc
bindel = SHIFT, XF86AudioLowerVolume, exec, $scriptsDir/volume.sh ldec
bindel = ,XF86AudioMute, exec, $scriptsDir/volume.sh mute
bindel = ,XF86AudioMicMute, exec, $scriptsDir/volume.sh mute-mic
bindel = ,XF86MonBrightnessUp, exec, $scriptsDir/brightness.sh inc
bindel = ,XF86MonBrightnessDown, exec, $scriptsDir/brightness.sh dec
bindel = SHIFT, XF86MonBrightnessUp, exec, $scriptsDir/brightness.sh linc
bindel = SHIFT, XF86MonBrightnessDown, exec, $scriptsDir/brightness.sh ldec

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0

# Workspaces
windowrulev2 = workspace 1, class:zen
windowrulev2 = workspace 5, class:obsidian
windowrulev2 = workspace 5, class:steam
windowrulev2 = workspace 6 silent, class:discord
windowrulev2 = workspace 7 silent, class:Spotify
windowrulev2 = workspace 8, class:blueman-manager
windowrulev2 = workspace 8, class:org.pulseaudio.pavucontrol

# No Transparency effects
windowrulev2 = opacity 1 override, title:(.*)(- YouTube)(.*), focus:1
windowrulev2 = opacity 1 override, class:(Minecraft)(.*), focus:1
windowrulev2 = opacity 1 override, class:org.vinegarhq.Sober, focus:1
windowrulev2 = opacity 1 override, class:org.gnome.Loupe, focus:1
windowrulev2 = opacity 1 override, class:vlc, focus:1
windowrulev2 = opacity 1 override, class:mpv, focus:1

# Rofi
windowrulev2 = rounding 32, class:Rofi, title:rofi -   Google
windowrulev2 = noshadow 0, class:Rofi

# Float
windowrulev2 = float, class:engrampa, title:Extract
windowrulev2 = float, class:org.gnome.Loupe
windowrulev2 = float, class:grub-customizer
windowrulev2 = float, class:nwg-look
windowrulev2 = float, class:nwg-displays
windowrulev2 = float, class:org.vinegarhq.Sober, title:Servers
windowrulev2 = float, class:org.gnome.Calculator

# Tearing
windowrulev2 = immediate, title:.*\.exe
windowrulev2 = immediate, class:^(steam_app)

# Picture-in-Picture
windowrulev2 = float, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrulev2 = keepaspectratio, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrulev2 = move 73% 72%, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$ 
windowrulev2 = size 25%, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrulev2 = float, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrulev2 = pin, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$

# Force Blur
layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = blur, logout_dialog
layerrule = ignorezero, logout_dialog
layerrule = blur, notifications
layerrule = ignorezero, notifications

# Workspace Rules
workspace = special:magic, gapsout:30, gapsin:10
