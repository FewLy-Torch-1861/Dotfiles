[config]
version_check = false
reload_apps = true

# [config.wallpaper]
# command = "swww"
# arguments = [ "img", "-t", "outer", "--transition-duration", "1.5", "--transition-step", "255", "--transition-fps", "60", "-f", "Nearest",]
# set = true

# ------------------------------------------------------------- #

[templates.hypr]
input_path = "~/.config/matugen/templates/hypr-colors.conf"
output_path = "~/.config/hypr/colors.conf"

[templates.rofi]
input_path = "~/.config/matugen/templates/rofi-colors.rasi"
output_path = "~/.config/rofi/colors.rasi"

[templates.yazi]
input_path = "~/.config/matugen/templates/yazi-colors.toml"
output_path = "~/.config/yazi/theme.toml"

[templates.kitty]
input_path = "~/.config/matugen/templates/kitty-colors.conf"
output_path = "~/.config/kitty/current-theme.conf"

# ------------------------------------------------------------- #

[templates.gtk3]
input_path = "~/.config/matugen/templates/gtk-colors.css"
output_path = "~/.config/gtk-3.0/colors.css"

[templates.gtk4]
input_path = "~/.config/matugen/templates/gtk-colors.css"
output_path = "~/.config/gtk-4.0/colors.css"

[templates.qt5ct]
input_path = "~/.config/matugen/templates/qt-colors.conf"
output_path = "~/.config/qt5ct/colors/matugen.conf"

[templates.qt6ct]
input_path = "~/.config/matugen/templates/qt-colors.conf"
output_path = "~/.config/qt6ct/colors/matugen.conf"

[templates.kvantum-svg]
input_path = "~/.config/matugen/templates/kvantum.svg"
output_path = "~/.config/Kvantum/matugen/matugen.svg"

[templates.kvantum-kvconfig]
input_path = "~/.config/matugen/templates/kvantum-colors.kvconfig"
output_path = "~/.config/Kvantum/matugen/matugen.kvconfig"

# ------------------------------------------------------------- #

[templates.css]
input_path = "~/.config/matugen/templates/colors.css"
output_path = "~/.cache/matugen/colors.css"

[templates.gtk]
input_path = "~/.config/matugen/templates/colors-gtk.css"
output_path = "~/.cache/matugen/colors-gtk.css"
