[config]
version_check = false

[templates]
hypr = { input_path = '~/.config/matugen/templates/colors-hypr.conf', output_path = '~/.config/hypr/colors.conf' }
yazi = { input_path = '~/.config/matugen/templates/colors-yazi.toml', output_path = '~/.config/yazi/theme.toml' }
kitty = { input_path = '~/.config/matugen/templates/colors-kitty.conf', output_path = '~/.config/kitty/current-theme.conf' }
rofi = { input_path = '~/.config/matugen/templates/colors-rofi.rasi', output_path = '~/.config/rofi/colors.rasi' }
gtk3 = { input_path = '~/.config/matugen/templates/colors-gtk.css', output_path = '~/.config/gtk-3.0/colors.css' }
gtk4 = { input_path = '~/.config/matugen/templates/colors-gtk.css', output_path = '~/.config/gtk-4.0/colors.css' }
