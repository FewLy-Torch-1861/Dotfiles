$sd = ~/.config/hypr/scripts
$launcher = $sd/run.sh 'pkill fuzzel || true; fuzzel' 'pkill rofi || true; rofi -show drun' 'pkill wofi || true; wofi --show drun'

$terminal = $sd/run.sh 'kitty -1' alacritty foot konsole
$fileManager = $sd/run.sh 'nautilus -w' dolphin 'kitty fish -c yazi'
$taskManager = $sd/taskmgr.sh

$browser = $sd/run.sh firefox brave chromium google-chrome chrome
$editor = $sd/run.sh codium code 'kitty --class neovim --title Neovim fish -c nvim' kate kwrite gnome-text-editor

$discord = $sd/run.sh 'vesktop' 'discord'

# Cursor
env = XCURSOR_THEME,Hoshimi-Miyabi
env = XCURSOR_SIZE,24

env = HYPRCURSOR_THEME,Hoshimi-Miyabi
env = HYPRCURSOR_SIZE,24

# Theme
env = QT_QPA_PLATFORMTHEME,qt6ct

# Wayland
env = NOBLEGL,1
env = OZONE_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
