$sd = ~/.config/hypr/scripts
$terminal = $sd/run.sh 'kitty -1' foot
$browser = $sd/run.sh firefox brave chromium chrome 
$fileManager = $sd/run.sh dolphin 'nautilus -w' 'kitty fish -c yazi'
$launcher = $sd/run.sh fuzzel 'rofi -show drun' 'wofi --show drun'
$editor = $sd/run.sh codium code kate 'kitty fish -c nvim'

# Cursor
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# XDG
env = XDG_CONFIG_HOME,/home/nutt/.config

# Theme
env = QT_QPA_PLATFORMTHEME,qt6ct
