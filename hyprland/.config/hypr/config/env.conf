$sd = ~/.config/hypr/scripts
$launcher = $sd/run.sh 'pkill fuzzel || true; fuzzel' 'pkill rofi || true; rofi -show drun' 'pkill wofi || true; wofi --show drun'

$terminal = $sd/run.sh 'kitty -1' alacritty foot konsole
$fileManager = $sd/run.sh 'nautilus -w' dolphin 'kitty fish -c yazi'
$taskManager = $sd/run.sh missioncenter 'kitty -1 --class taskmgr --title "Task Manager" fish -c btop' 'kitty -1 --class taskmgr --title "Task Manager" fish -c htop' 'kitty -1 --class taskmgr --title "Task Manager" fish -c top'

$browser = $sd/run.sh firefox brave chromium google-chrome chrome
$editor = $sd/run.sh codium code kate 'kitty --class neovim --title Neovim fish -c nvim'

$discord = $sd/run.sh 'vesktop' 'discord'

# Cursor
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# XDG
env = XDG_CONFIG_HOME,/home/nutt/.config

# Theme
env = QT_QPA_PLATFORMTHEME,qt6ct

# Wayland
env = NOBLEGL,1
env = OZONE_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
