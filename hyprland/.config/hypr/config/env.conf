$sd = ~/.config/hypr/scripts
$launcher = $sd/run.sh 'pkill fuzzel || true; fuzzel' 'pkill rofi || true; rofi -show drun' 'pkill wofi || true; wofi --show drun'

$terminal = $sd/run.sh 'kitty -1' alacritty foot konsole
$fileManager = $sd/run.sh dolphin 'nautilus -w' 'kitty fish -c yazi'
$browser = $sd/run.sh firefox brave chromium google-chrome chrome
$editor = $sd/run.sh codium code kate 'kitty --class neovim fish -c nvim'

$discord = $sd/run.sh 'vesktop --enable-features=UseOzonePlatform --ozone-platform=wayland' 'discord --enable-features=UseOzonePlatform --ozone-platform=wayland'
$spotify = $sd/run.sh 'spotify --enable-features=UseOzonePlatform --ozone-platform=wayland'

# Cursor
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# XDG
env = XDG_CONFIG_HOME,/home/nutt/.config

# Theme
env = QT_QPA_PLATFORMTHEME,qt6ct
