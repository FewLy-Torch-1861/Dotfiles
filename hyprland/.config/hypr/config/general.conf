monitor=,preferred,auto,auto

general {
  gaps_in = 5
  gaps_out = 10

  border_size = 1

  col.active_border = $mauve
  col.inactive_border = $subtext0

  resize_on_border = false
  allow_tearing = false

  layout = dwindle
}

decoration {
  rounding = 0
  rounding_power = 2

  active_opacity = 1.0
  inactive_opacity = 0.80

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 6
    passes = 3

    vibrancy = 0.1696
  }
}

dwindle {
  pseudotile = true
  preserve_split = true
}

master {
  new_status = master
}

misc {
  force_default_wallpaper = 0
  disable_hyprland_logo = true
}

input {
  kb_layout = us
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =

  follow_mouse = 1
  force_no_accel = true

  touchpad {
    natural_scroll = false
  }
}
