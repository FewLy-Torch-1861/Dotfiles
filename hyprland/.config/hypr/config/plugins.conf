plugin {
  dynamic-cursors {
    enabled = true
    mode = tilt
    threshold = 2

    tilt {
      limit = 5000
      function = negative_quadratic
      window = 100
    }

    shake {
      enabled = true
      nearest = true

      threshold = 6.0
      base = 4.0
      speed = 4.0
      influence = 0.0
      limit = 0.0
      timeout = 2000

      effects = true
      ipc = false
    }

    hyprcursor {
      nearest = true
      enabled = true
      resolution = -1
      fallback = clientside
    }
  }
}
