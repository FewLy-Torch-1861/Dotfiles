gesture = 3, horizontal, workspace

$Mod = Super

## Launch most use programs
bind = $Mod, Return, exec, $terminal
bind = $Mod, T, exec, $terminal
bind = $Mod, E, exec, $fileManager
bind = $Mod, B, exec, $browser
bind = $Mod, C, exec, $editor
bind = Alt, Space, exec, $launcher
bind = Ctrl Shift, Escape, exec, $taskManager

# Fuzzel
bind = $Mod, V, exec, $sd/clipboard.sh

### General
# Kill/Force kill active window
bind = $Mod, Q, killactive,
bind = Alt, F4, forcekillactive,

# Fullscreen/Maximize
bind = $Mod, F, fullscreen, 0
bind = $Mod, D, fullscreen, 1

## Floating
bind = $Mod, A, pin,
bind = $Mod, Z, setfloating, active
bind = $Mod, Z, resizeactive, exact 1000 600
bind = $Mod, Z, centerwindow,
bind = $Mod Shift, Z, settiled, active

## dwindle
bind = $Mod, P, pseudo,
bind = $Mod, O, togglesplit,

## Misc
bindl = , Print, exec, hyprshot -o ~/Pictures/Screenshots -m output -m eDP-1
bind = Shift, Print, exec, hyprshot -o ~/Pictures/Screenshots -m window
bind = Alt, Print, exec, hyprshot -o ~/Pictures/Screenshots -m region

bind = $Mod Shift, C, exec, hyprpicker -a # Color picker
bind = $Mod Shift, W, exec, $sd/wall.sh # Wallpaper changer

## Notification
binde = $Mod Ctrl, N, exec, notify-send "Hyprland is awesome!" "<s>this</s> is <i>a</i> <b>test</b> <u>notification</u> <b>ดีจ้า</b>" -i ~/Pictures/Assets/hyprland.png -t 2000

## System
bindl = $Mod Ctrl Alt Shift, M, exit,
bindl = $Mod Shift, R, exec, $sd/reload.sh
bindl = $Mod Ctrl, L, exec, hyprlock
bindl = Ctrl Alt, Delete, exec, wlogout -p layer-shell

### Window Management
# To switch between windows in a floating workspace
binde = Alt, Tab, cyclenext,
binde = Alt, Tab, bringactivetotop,
binde = Alt Shift, Tab, cyclenext, prev
binde = Alt Shift, Tab, bringactivetotop, prev

# Move focus with Mod + Vim keys
binde = $Mod, H, movefocus, l
binde = $Mod, J, movefocus, d
binde = $Mod, K, movefocus, u
binde = $Mod, L, movefocus, r

# Resize window width with Mod + ; or '
#              height with Mod + [ or ]
binde = $Mod, Semicolon, resizeactive, -25 0
binde = $Mod, Apostrophe, resizeactive, 25 0
binde = $Mod, Bracketleft, resizeactive, 0 -20
binde = $Mod, Bracketright, resizeactive, 0 20

binde = $Mod Shift, Semicolon, resizeactive, -75 0
binde = $Mod Shift, Apostrophe, resizeactive, 75 0
binde = $Mod Shift, Bracketleft, resizeactive, 0 -70
binde = $Mod Shift, Bracketright, resizeactive, 0 70

# Move window with Mod + Shift + Vim keys
binde = $Mod Shift, H, movewindow, l
binde = $Mod Shift, J, movewindow, d
binde = $Mod Shift, K, movewindow, u
binde = $Mod Shift, L, movewindow, r

# Scroll through existing workspaces with Mod + scroll
bind = $Mod, mouse_down, workspace, e+1
bind = $Mod, mouse_up, workspace, e-1

# Jump through existing workspaces with Mod + Tab
binde = $Mod, Tab, workspace, e+1
binde = $Mod Shift, Tab, workspace, e-1

# Switch workspaces with Mod + [0-9]
bind = $Mod, 1, workspace, 1
bind = $Mod, 2, workspace, 2
bind = $Mod, 3, workspace, 3
bind = $Mod, 4, workspace, 4
bind = $Mod, 5, workspace, 5
bind = $Mod, 6, workspace, 6
bind = $Mod, 7, workspace, 7
bind = $Mod, 8, workspace, 8
bind = $Mod, 9, workspace, 9
bind = $Mod, 0, workspace, 10

# Move active window to a workspace with Mod + Shift + [0-9]
bind = $Mod Shift, 1, movetoworkspace, 1
bind = $Mod Shift, 2, movetoworkspace, 2
bind = $Mod Shift, 3, movetoworkspace, 3
bind = $Mod Shift, 4, movetoworkspace, 4
bind = $Mod Shift, 5, movetoworkspace, 5
bind = $Mod Shift, 6, movetoworkspace, 6
bind = $Mod Shift, 7, movetoworkspace, 7
bind = $Mod Shift, 8, movetoworkspace, 8
bind = $Mod Shift, 9, movetoworkspace, 9
bind = $Mod Shift, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $Mod, S, togglespecialworkspace, magic
bind = $Mod Shift, S, movetoworkspace, special:magic

# Move/resize windows with Mod + LMB/RMB and dragging
bindm = $Mod, mouse:272, movewindow
bindm = $Mod, mouse:273, resizewindow

### Keyboard media keys
## Laptop multimedia keys for volume and LCD brightness
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = Shift, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 1%+
bindel = Shift, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

## MPRIS Controll
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = $Mod Shift, N, exec, playerctl next
bindl = $Mod Shift, P, exec, playerctl play-pause
bindl = $Mod Shift, B, exec, playerctl previous
