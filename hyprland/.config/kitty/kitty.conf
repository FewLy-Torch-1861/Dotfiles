## FONTs
# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
font_size 11.0

## CURSOR
cursor_shape beam
cursor_blink_interval 1000
cursor_trail 1

## SCROLLBACK
scrollback_lines 5000

## LAYOUT
window_margin_width 0
window_padding_width 3

hide_window_decorations yes
resize_in_steps no
confirm_os_window_close 0

## COLOR SCHEME
# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
background_opacity 0.9

## OS SPECIFIC TWEAKS
linux_display_server wayland

## KEYBOARD SHORTCUTS
map ctrl+shift+, load_config_file
map ctrl+space launch --type=overlay ~/.config/kitty/scripts/launcher.sh
